name: Main Workflow

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        ocaml-compiler:
          - 4.14.2
        skip_test:
          - false
        windows-environment:
          - "msys2"

        include:
          - os: ubuntu-latest
            ocaml-compiler: 4.13.0
            skip_test: true
            windows-environment: "msys2"
          - os: windows-latest
            ocaml-compiler: 4.14.2
            skip_test: false
            windows-environment: "cygwin"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Retrieve opam cache
        uses: actions/cache@v5
        id: cache-opam
        with:
          path: ~/.opam
          key: v2-${{ runner.os }}-autofonce-${{ matrix.ocaml-compiler }}-${{ hashFiles('opam/*.opam') }}
#          restore-keys: |
#            v2-${{ runner.os }}-opam-${{ matrix.ocaml-compiler }}-

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          windows-compiler: "mingw"
          windows-environment: ${{ matrix.windows-environment }}
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          opam-pin: false

      - name: Set git user
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions-bot@users.noreply.github.com

      # define opam-repo = "git+https://" to add an extra opam repo

      - run: opam pin add . -y --no-action

      # - run: opam depext -y autofonce autofonce_core autofonce_lib autofonce_m4 autofonce_share autofonce_patch autofonce_config autofonce_misc
#        if: steps.cache-opam.outputs.cache-hit != 'true'

      - run: opam install -y opam/*.opam vendors/**/*.opam --deps-only --with-test
        if: matrix.os != 'windows-latest'
      - run: opam install -y opam\\*.opam vendors\\ANSITerminal\\*.opam --deps-only --with-test
        if: matrix.os == 'windows-latest'
#        if: steps.cache-opam.outputs.cache-hit != 'true'

#      - run: opam upgrade --fixup
#        if: steps.cache-opam.outputs.cache-hit == 'true'

      - run: dos2unix scripts/*.sh
        if: matrix.os == 'windows-latest'

      - run: make build

      - name: run test suite
        run: |
          ./autofonce run
        if: matrix.skip_test  != 'true'

      - name: Upload results.log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testsuite-${{ matrix.os }}-${{ matrix.ocaml-compiler }}.log
          path: _build/_autofonce/results.log

      - name: Upload _autofonce/
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: autofonce-dir-${{ matrix.os }}-${{ matrix.ocaml-compiler }}
          path: _build/_autofonce

      - name: test source is well formatted
        run: make fmt
        continue-on-error: true
        if: matrix.ocaml-compiler == '4.13.0' && matrix.os == 'ubuntu-latest'

      - name: build-doc
        if: github.ref == 'refs/heads/master' && matrix.ocaml-compiler == '4.13.0' && matrix.os == 'ubuntu-latest'
        run: |
             sudo apt install -yqq python3-sphinx python3-sphinx-rtd-theme
             opam install -y dune odoc
             make doc
             touch _drom/docs/.nojekyll
             touch _drom/docs/sphinx/.nojekyll
             touch _drom/docs/doc/.nojekyll

      - name: deploy-doc
        uses: JamesIves/github-pages-deploy-action@3.6.2
        if: github.ref == 'refs/heads/master' && matrix.ocaml-compiler == '4.13.0' && matrix.os == 'ubuntu-latest'
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: _drom/docs/
          CLEAN: true

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: autofonce-${{ matrix.os }}-${{ matrix.ocaml-compiler }}
          path: _build/default/src/autofonce/main.exe
